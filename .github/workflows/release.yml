name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.14.3)'
        required: true

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

  test:
    needs: create-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --release

      - run: cargo test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runs-on: ubuntu-latest
            artifact: aivo-linux-x64
          - target: aarch64-unknown-linux-musl
            runs-on: ubuntu-latest
            artifact: aivo-linux-arm64
          - target: x86_64-apple-darwin
            runs-on: macos-latest
            artifact: aivo-darwin-x64
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            artifact: aivo-darwin-arm64
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            artifact: aivo-windows-x64.exe
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: contains(matrix.target, 'linux')
        run: |
          sudo apt-get update
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu musl-dev
            echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "RUSTFLAGS=-C target-feature=+crt-static" >> $GITHUB_ENV
          else
            sudo apt-get install -y musl-tools
          fi

      - name: Build ${{ matrix.artifact }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.runs-on }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/aivo.exe dist/${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/aivo dist/${{ matrix.artifact }}
          fi

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          for f in aivo-*; do sha256sum "$f" > "$f.sha256"; done

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ inputs.version }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          FEATS=$(git log "$RANGE" --oneline --grep="^feat:" --format="- %s" | sed 's/^- feat: /- /')
          FIXES=$(git log "$RANGE" --oneline --grep="^fix:" --format="- %s" | sed 's/^- fix: /- /')
          REFACTORS=$(git log "$RANGE" --oneline --grep="^refactor:" --format="- %s" | sed 's/^- refactor: /- /')
          OTHER=$(git log "$RANGE" --oneline --format="%s" | grep -v -E "^(feat|fix|refactor|style|chore|docs|test|ci):" | sed 's/^/- /')

          BODY=""
          if [ -n "$FEATS" ]; then
            BODY="${BODY}### Features\n${FEATS}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}### Fixes\n${FIXES}\n\n"
          fi
          if [ -n "$REFACTORS" ]; then
            BODY="${BODY}### Refactoring\n${REFACTORS}\n\n"
          fi
          if [ -n "$OTHER" ]; then
            BODY="${BODY}### Other\n${OTHER}\n\n"
          fi

          if [ -z "$BODY" ]; then
            BODY="Release ${TAG}"
          fi

          {
            echo "body<<CHANGELOG_EOF"
            echo -e "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release
        run: |
          gh release create "${{ inputs.version }}" \
            --title "${{ inputs.version }}" \
            --notes "${{ steps.changelog.outputs.body }}" \
            artifacts/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: release-artifacts
          path: artifacts/*

  update-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set npm package version
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          cd npm
          npm pkg set version="$VERSION"

      - name: Run tests
        run: cd npm && npm test

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm && npm publish --access public

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Read checksums and update homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"

          DARWIN_ARM64_SHA=$(cut -d' ' -f1 < artifacts/aivo-darwin-arm64.sha256)
          DARWIN_X64_SHA=$(cut -d' ' -f1 < artifacts/aivo-darwin-x64.sha256)
          LINUX_ARM64_SHA=$(cut -d' ' -f1 < artifacts/aivo-linux-arm64.sha256)
          LINUX_X64_SHA=$(cut -d' ' -f1 < artifacts/aivo-linux-x64.sha256)

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yuanchuan/homebrew-tap.git"

          python3 - <<EOF
          import re

          with open("homebrew-tap/Formula/aivo.rb") as f:
              content = f.read()

          content = re.sub(r'version "[^"]*"', 'version "${VERSION}"', content)

          shas = [
              "${DARWIN_ARM64_SHA}",
              "${DARWIN_X64_SHA}",
              "${LINUX_ARM64_SHA}",
              "${LINUX_X64_SHA}",
          ]
          idx = 0
          def replace_sha(m):
              global idx
              result = f'sha256 "{shas[idx]}"'
              idx += 1
              return result

          content = re.sub(r'sha256 "[a-f0-9]+"', replace_sha, content)

          with open("homebrew-tap/Formula/aivo.rb", "w") as f:
              f.write(content)
          EOF

          cd homebrew-tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/aivo.rb
          git commit -m "chore: update aivo to v${VERSION}"
          git push
