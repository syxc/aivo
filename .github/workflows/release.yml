name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --release

      - run: cargo test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            artifact: aivo-linux-x64
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-latest
            artifact: aivo-linux-arm64
          - target: x86_64-apple-darwin
            runs-on: macos-latest
            artifact: aivo-darwin-x64
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            artifact: aivo-darwin-arm64
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            artifact: aivo-windows-x64.exe
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build ${{ matrix.artifact }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.runs-on }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/aivo.exe dist/${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/aivo dist/${{ matrix.artifact }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          for f in aivo-*; do sha256sum "$f" > "$f.sha256"; done

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          FEATS=$(git log "$RANGE" --oneline --grep="^feat:" --format="- %s" | sed 's/^- feat: /- /')
          FIXES=$(git log "$RANGE" --oneline --grep="^fix:" --format="- %s" | sed 's/^- fix: /- /')
          REFACTORS=$(git log "$RANGE" --oneline --grep="^refactor:" --format="- %s" | sed 's/^- refactor: /- /')
          OTHER=$(git log "$RANGE" --oneline --format="%s" | grep -v -E "^(feat|fix|refactor|style|chore|docs|test|ci):" | sed 's/^/- /')

          BODY=""
          if [ -n "$FEATS" ]; then
            BODY="${BODY}### Features\n${FEATS}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}### Fixes\n${FIXES}\n\n"
          fi
          if [ -n "$REFACTORS" ]; then
            BODY="${BODY}### Refactoring\n${REFACTORS}\n\n"
          fi
          if [ -n "$OTHER" ]; then
            BODY="${BODY}### Other\n${OTHER}\n\n"
          fi

          if [ -z "$BODY" ]; then
            BODY="Release ${TAG}"
          fi

          {
            echo "body<<CHANGELOG_EOF"
            echo -e "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/*
